{% extends "base.html" %}

{% block content %}

<h2>Submit Assignment</h2>

<form method="POST" enctype="multipart/form-data">
    {% csrf_token %}
    
    <label for="file">Upload File:</label><br>
    <input id="file" type="file" name="file" required><br><br>
    
    <button type="submit">Submit Assignment</button>
</form>

{% endblock %}
