{% for n in notifications %}
<div style="padding:8px; border-bottom:1px solid #eee;">
    
    {% if n.link %}
        <a href="{{ n.link }}" style="text-decoration:none; color:black;">
            {{ n.message }}
        </a>
    {% else %}
        {{ n.message }}
    {% endif %}

</div>
{% empty %}
<div>No new notifications</div>
{% endfor %}
